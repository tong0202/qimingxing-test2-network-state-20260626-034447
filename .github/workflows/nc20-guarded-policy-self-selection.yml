name: NC20 Guarded Policy Self Selection

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of remote guarded-policy behavior cycles"
        required: false
        default: "1"
      run_id:
        description: "Optional audit run id"
        required: false
        default: ""
  repository_dispatch:
    types: [qmx_nc20_guarded_policy_self_selection]

permissions:
  contents: write

concurrency:
  group: nc20-guarded-policy-self-selection
  cancel-in-progress: false

jobs:
  guarded-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run NC-20 guarded policy self-selection worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_CYCLES: ${{ github.event.inputs.cycles || github.event.client_payload.cycles || '1' }}
          EVENT_RUN_ID: ${{ github.event.inputs.run_id || github.event.client_payload.run_id || '' }}
        run: |
          python scripts/nc_20_guarded_policy_self_selection_worker.py --cycles "$EVENT_CYCLES" --run-id "$EVENT_RUN_ID"
