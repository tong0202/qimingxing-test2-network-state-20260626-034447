name: F3 Low Frequency Self Scheduler Loop

on:
  repository_dispatch:
    types: [qmx_f3_lowfreq_self_scheduler_loop]
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: f3-lowfreq-self-scheduler-loop
  cancel-in-progress: false

jobs:
  lowfreq-self-scheduler-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run F3 low-frequency self scheduler loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/nsl_f3_lowfreq_self_scheduler_loop.py --mode external --windows 1 --raw-check
