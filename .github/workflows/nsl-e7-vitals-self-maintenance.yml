name: E7 Controlled Vitals Self Maintenance

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: e7-controlled-vitals-self-maintenance
  cancel-in-progress: false

jobs:
  controlled-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run E7 controlled vitals self-maintenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/nsl_e7_vitals_self_maintenance.py --mode external --raw-timeout 240 --raw-interval 8
