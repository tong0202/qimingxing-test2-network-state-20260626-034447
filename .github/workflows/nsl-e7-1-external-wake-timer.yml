name: E7.1 External Wake Timer

on:
  schedule:
    - cron: "12,22,32,42,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: e7-1-external-wake-timer
  cancel-in-progress: false

jobs:
  wake-e7:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Wake E7 controlled self-maintenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/nsl_e7_vitals_self_maintenance.py --mode external --raw-timeout 240 --raw-interval 8

      - name: Run E8.2 post-wake self-check and maintenance receipt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/nsl_e8_2_post_wake_self_maintenance.py --mode external --raw-timeout 240 --raw-interval 8
